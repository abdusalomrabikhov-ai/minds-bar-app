<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MindsBar</title>
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="icon" type="image/png" href="/img/favicon.png?v=2">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/img/icon-180.png">
  <meta name="theme-color" content="#881237">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TeamTask">
  <link rel="preload" href="/fonts/gotham_book.woff2?v=1" as="font" type="font/woff2">
  <link rel="preload" href="/fonts/gotham_bold.woff2?v=1" as="font" type="font/woff2">
  <link rel="stylesheet" href="/css/style.min.css?v=44">
</head>
<body>

<!-- ─── LOGIN ─────────────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">
        <img src="/img/logo.png" alt="MindsBar" style="width:26px;height:26px;object-fit:contain;filter:brightness(0) invert(1)">
      </div>
      <h1>MindsBar</h1>
    </div>
    <h2>Добро пожаловать</h2>
    <p>Войдите, чтобы управлять задачами команды</p>
    <div id="login-error" class="login-error"></div>
    <div id="login-view">
      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="name@minds.com" required>
        </div>
        <div class="form-group">
          <label>Пароль</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary" id="login-btn">Войти</button>
      </form>
      <div style="text-align:center;margin-top:16px">
        <button type="button" class="forgot-link" id="forgot-link">Забыли пароль?</button>
      </div>
    </div>

    <div id="reset-view" style="display:none">
      <div id="reset-step-1">
        <p style="color:#6b7280;font-size:13.5px;margin-bottom:20px">Введите ваш email — отправим код в Telegram</p>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reset-email" placeholder="your@email.com">
        </div>
        <button type="button" class="btn-primary" id="reset-request-btn">Отправить код</button>
      </div>
      <div id="reset-step-2" style="display:none">
        <p style="color:#6b7280;font-size:13.5px;margin-bottom:20px">Введите код из Telegram и новый пароль</p>
        <div class="form-group">
          <label>Код из Telegram</label>
          <input type="text" id="reset-code" placeholder="123456" maxlength="6" inputmode="numeric">
        </div>
        <div class="form-group">
          <label>Новый пароль</label>
          <input type="password" id="reset-password" placeholder="Минимум 6 символов">
        </div>
        <button type="button" class="btn-primary" id="reset-confirm-btn">Сменить пароль</button>
      </div>
      <div style="text-align:center;margin-top:16px">
        <button type="button" class="forgot-link" id="back-to-login">← Назад к входу</button>
      </div>
    </div>
  </div>
</div>

<!-- ─── APP ───────────────────────────────────────────────────────────────── -->
<div id="app-screen" class="hidden">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header" onclick="navigateTo('dashboard')" style="cursor:pointer" title="На главную">
      <div class="sidebar-logo-icon">
        <img src="/img/logo.png" alt="MindsBar" style="width:20px;height:20px;object-fit:contain;filter:brightness(0) invert(1)">
      </div>
      <div>
        <div class="sidebar-logo-text">MindsBar</div>
        <div class="sidebar-logo-sub">Управление задачами</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Рабочее пространство</div>
      <button class="nav-item" data-page="dashboard">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg></span>
        <span class="label">Дашборд</span>
      </button>
      <button class="nav-item" data-page="tasks">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></span>
        <span class="label">Все задачи</span>
      </button>
      <button class="nav-item" data-page="mytasks">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg></span>
        <span class="label">Мои задачи</span>
      </button>
      <button class="nav-item nav-item--admin" data-page="review" id="nav-review" style="display:none">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span>
        <span class="label">Задачи для проверки</span>
        <span class="nav-review-badge" id="nav-review-badge" style="display:none"></span>
      </button>
      <button class="nav-item" data-page="best-employee">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></span>
        <span class="label">Лучший сотрудник</span>
      </button>

      <button class="nav-item" data-page="calendar">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01M16 18h.01"/></svg></span>
        <span class="label">Календарь</span>
      </button>
      <button class="nav-item" data-page="ideahast" data-perm="manage_ideahast">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg></span>
        <span class="label" style="font-weight:700">Ideahast</span>
      </button>
      <button class="nav-item" data-page="team" data-perm="manage_team">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></span>
        <span class="label">Команда</span>
      </button>
      <button class="nav-item" data-page="reports" data-perm="reports">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg></span>
        <span class="label">Отчёты</span>
      </button>
      <button class="nav-item" data-page="kids" data-perm="manage_kids">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="23 21 23 19 19 19"/><polyline points="19 15 23 15"/></svg></span>
        <span class="label">Финансы Kids</span>
      </button>
      <button class="nav-item" data-page="b2c" data-perm="manage_b2c">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></span>
        <span class="label">Финансы В2С</span>
      </button>
      <button class="nav-item" data-page="finance" data-perm="manage_finance">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span>
        <span class="label">Финансы</span>
      </button>
      <button class="nav-item" data-page="finance-log" data-perm="manage_finance_log">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></span>
        <span class="label">Активность финансов</span>
      </button>
      <button class="nav-item nav-item--admin" data-page="activity" id="nav-activity" style="display:none">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span>
        <span class="label">Активность</span>
      </button>
      <button class="nav-item" data-page="settings">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></span>
        <span class="label">Настройки</span>
      </button>
    </nav>

    <div class="sidebar-projects">
      <div class="sidebar-projects-header" id="sidebar-projects-toggle">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg></span>
        <span class="label">Проекты</span>
        <span class="projects-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg></span>
      </div>
      <div id="sidebar-projects-wrapper">
        <div class="projects-tree" id="sidebar-projects-list"></div>
        <button class="nav-item admin-only" onclick="openArchivedProjects()" style="margin-top:2px;opacity:0.7;font-size:12px">
          <span class="icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg></span>
          <span class="label">Архив проектов</span>
        </button>
        <button class="nav-item" id="add-project-btn" data-perm="manage_projects" style="margin-top:4px">
          <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span>
          <span class="label">Добавить проект</span>
        </button>
      </div>
    </div>

    <!-- Feedback block -->
    <div class="sidebar-feedback">
      <div class="sidebar-feedback-title">Обратная связь</div>
      <div class="sidebar-feedback-desc" style="margin-bottom:10px">Есть идея или вопрос? Напишите руководителю.</div>
      <div class="admin-only" style="margin-bottom:6px">
        <button class="feedback-btn" onclick="openBroadcastModal()" style="background:var(--surface-2);color:var(--text);border:1px solid var(--border)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          <span>Отправить сообщение</span>
        </button>
      </div>
      <button class="feedback-btn" id="sidebar-feedback-btn" onclick="openFeedbackModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <span>Обратная связь руководителю</span>
      </button>
    </div>

    <div class="sidebar-footer">
      <div class="user-info" data-page="settings">
        <div class="avatar" id="sidebar-avatar"></div>
        <div style="min-width:0;flex:1">
          <div class="user-name" id="sidebar-name"></div>
          <div class="user-role" id="sidebar-role"></div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Sidebar overlay for mobile -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeMobileSidebar()"></div>

  <!-- Main -->
  <main id="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="mobile-burger" id="mobile-burger-btn" onclick="openMobileSidebar()" title="Меню">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="topbar-brand">
          <div class="topbar-title" id="page-title">Дашборд</div>
          <div class="topbar-subtitle" id="page-subtitle"></div>
        </div>
      </div>

      <div class="topbar-search-wrap">
        <button class="topbar-search gs-trigger-btn" onclick="openGlobalSearch()" title="Глобальный поиск (⌘K)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <span>Поиск по задачам...</span>
          <kbd>⌘K</kbd>
        </button>
      </div>

      <div class="topbar-actions">
        <button class="btn-notif mobile-search-btn" onclick="openGlobalSearch()" title="Поиск">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="btn-notif btn-theme" id="theme-btn" onclick="toggleTheme()" title="Сменить тему">
          <svg id="theme-icon-moon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg id="theme-icon-sun" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button class="btn-notif" id="notif-btn" title="Уведомления">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="notif-dot hidden" id="notif-dot"></span>
        </button>
        <button class="btn btn-blue" id="new-task-btn">
          <svg class="new-task-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span class="new-task-text"> Новая задача</span>
        </button>
      </div>
    </div>

    <div class="page-content" id="page-content"></div>
  </main>
</div>

<!-- ─── MOBILE NAV ────────────────────────────────────────────────────────── -->
<nav class="mobile-nav" id="mobile-nav">
  <button class="mobile-nav-item" data-page="dashboard" onclick="navigateTo('dashboard')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
    Дашборд
  </button>
  <button class="mobile-nav-item" data-page="tasks" onclick="navigateTo('tasks')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    Задачи
  </button>
  <button class="mobile-nav-item" data-page="mytasks" onclick="navigateTo('mytasks')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    Мои
  </button>
  <button class="mobile-nav-item" data-page="calendar" onclick="navigateTo('calendar')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Календарь
  </button>
  <button class="mobile-nav-item" id="mobile-notif-btn" onclick="document.getElementById('notif-btn').click()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    Уведомления
  </button>
</nav>

<!-- ─── NOTIFICATIONS PANEL ────────────────────────────────────────────────── -->
<div id="notif-panel" class="notif-panel hidden"></div>

<!-- ─── MODALS ────────────────────────────────────────────────────────────── -->
<div id="modal-root"></div>

<!-- ─── TOASTS ────────────────────────────────────────────────────────────── -->
<div class="toast-container" id="toast-container"></div>
